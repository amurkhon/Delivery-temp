services:
  delivery-app:
    container_name: delivery-frontend
    restart: always
    image: node:22.12.0
    ports:
      - "6001:4000"
    environment:
      - PORT=4000
    volumes:
      - ./:/usr/src/delivery-app
    working_dir: /usr/src/delivery-app
    networks:
      - client-network
    command: bash -c "yarn && yarn run build && yarn run start"

networks:
  client-network:
    driver: bridge